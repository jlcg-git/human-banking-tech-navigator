<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human + Banking + Tech Navigator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #07101f;
      --surface:    #0d1b30;
      --card-bg:    #0f2040;
      --accent:     #c8a84b;
      --accent-dim: #7a6530;
      --blue:       #4a90d9;
      --text:       #e2e8f0;
      --muted:      #6b7fa3;
      --border:     #1a2d4a;
      --radius:     10px;
      --max-w:      1200px;
    }

    html { scroll-behavior: smooth; }
    body { font-family: Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(7,16,31,0.96); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-size: 0.8rem; font-weight: bold; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
    .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.78rem; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }
    #lang-toggle { display: flex; gap: 0.3rem; }
    #lang-toggle button { background: transparent; border: 1px solid var(--accent-dim); color: var(--muted); font-size: 0.72rem; padding: 0.22rem 0.55rem; border-radius: 4px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    #lang-toggle button.active, #lang-toggle button:hover { background: var(--accent); color: #000; border-color: var(--accent); }

    /* ── HERO ── */
    #hero {
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 7rem 1.5rem 5rem;
      position: relative; overflow: hidden;
      background: radial-gradient(ellipse at 15% 60%, rgba(74,144,217,0.08) 0%, transparent 55%),
                  radial-gradient(ellipse at 85% 25%, rgba(200,168,75,0.07) 0%, transparent 50%), var(--bg);
    }
    #hero::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background-image: linear-gradient(rgba(26,45,74,0.25) 1px, transparent 1px), linear-gradient(90deg, rgba(26,45,74,0.25) 1px, transparent 1px);
      background-size: 55px 55px;
    }
    .hero-eyebrow { font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; position: relative; }
    .hero-question { font-size: clamp(2rem, 5vw, 3.6rem); font-weight: bold; line-height: 1.2; color: var(--text); max-width: 820px; position: relative; }
    .hero-question em { color: var(--accent); font-style: normal; }
    .hero-sub { margin-top: 1.4rem; font-size: 1rem; color: var(--muted); max-width: 560px; line-height: 1.75; position: relative; }
    .hero-stats { display: flex; gap: 2rem; margin-top: 2.5rem; flex-wrap: wrap; justify-content: center; position: relative; }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; min-width: 120px; }
    .stat-num { font-size: 2rem; font-weight: bold; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 0.7rem; color: var(--muted); text-align: center; line-height: 1.4; max-width: 140px; }
    .stat-source { font-size: 0.62rem; color: var(--accent-dim); text-decoration: none; transition: color 0.2s; }
    .stat-source:hover { color: var(--accent); text-decoration: underline; }
    .stats-divider { width: 1px; background: var(--border); align-self: stretch; }
    .hero-pillars { display: flex; gap: 0.7rem; margin-top: 2.2rem; flex-wrap: wrap; justify-content: center; position: relative; }
    .hero-pill { background: rgba(200,168,75,0.1); border: 1px solid var(--accent-dim); color: var(--accent); padding: 0.35rem 0.9rem; border-radius: 20px; font-size: 0.76rem; letter-spacing: 0.04em; }
    .hero-cta { margin-top: 2.2rem; display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; position: relative; }
    .btn-primary { background: var(--accent); color: #000; border: none; padding: 0.8rem 1.8rem; border-radius: 6px; font-size: 0.88rem; font-weight: bold; cursor: pointer; letter-spacing: 0.04em; text-decoration: none; transition: opacity 0.2s; display: inline-block; font-family: inherit; }
    .btn-primary:hover { opacity: 0.82; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 0.8rem 1.8rem; border-radius: 6px; font-size: 0.88rem; cursor: pointer; letter-spacing: 0.04em; text-decoration: none; transition: all 0.2s; display: inline-block; font-family: inherit; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .hero-scroll { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); color: var(--muted); font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 0.4rem; animation: float 2.5s ease-in-out infinite; text-decoration: none; }
    @keyframes float { 0%,100%{transform:translateX(-50%) translateY(0);opacity:.6} 50%{transform:translateX(-50%) translateY(7px);opacity:1} }

    /* ── LAYOUT ── */
    .section-divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); }
    .section-wrap { padding: 5rem 1.5rem; }
    .section-inner { max-width: var(--max-w); margin: 0 auto; }
    .section-eyebrow { font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.55rem; }
    .section-title { font-size: clamp(1.4rem, 2.5vw, 1.9rem); font-weight: bold; color: var(--text); }
    .section-desc { margin-top: 0.45rem; color: var(--muted); font-size: 0.88rem; max-width: 580px; line-height: 1.65; }
    .section-header { margin-bottom: 2.5rem; }

    .live-badge { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(74,144,217,0.1); border: 1px solid rgba(74,144,217,0.3); color: var(--blue); padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; margin-left: 0.8rem; vertical-align: middle; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── SUBSECTION ── */
    .subsection { margin-top: 3.5rem; padding-top: 3rem; border-top: 1px solid var(--border); }
    .subsection-eyebrow { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--blue); margin-bottom: 0.45rem; }
    .subsection-title { font-size: 1.25rem; font-weight: bold; color: var(--text); margin-bottom: 0.35rem; }
    .subsection-desc { font-size: 0.85rem; color: var(--muted); max-width: 580px; line-height: 1.6; margin-bottom: 1.8rem; }

    /* ── SIGNAL BOARD ── */
    #signal-board { background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    #search-wrap { margin-bottom: 1.8rem; }
    #search { width: 100%; padding: 0.65rem 1rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.9rem; outline: none; transition: border-color 0.2s; font-family: inherit; }
    #search:focus { border-color: var(--accent-dim); }
    #search::placeholder { color: var(--muted); }

    /* ── CÓMO PREPARARME ── */
    #como-prepararme { background: var(--bg); }

    /* ── LIDERAZGO CON IA ── */
    #liderazgo-ia { background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    /* ── CAROUSEL ── */
    .cat-section { margin-bottom: 3rem; }
    .cat-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; gap: 1rem; }
    .cat-label { display: flex; align-items: flex-start; gap: 0.7rem; }
    .cat-icon { width: 2.2rem; height: 2.2rem; background: rgba(200,168,75,0.1); border: 1px solid var(--accent-dim); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .cat-meta h3 { font-size: 0.98rem; color: var(--text); font-weight: bold; line-height: 1.3; }
    .cat-meta p { font-size: 0.76rem; color: var(--muted); margin-top: 0.2rem; line-height: 1.4; }
    .pillar-tag { display: inline-block; background: rgba(74,144,217,0.1); border: 1px solid rgba(74,144,217,0.25); color: var(--blue); padding: 0.15rem 0.55rem; border-radius: 4px; font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.3rem; }
    .cat-controls { display: flex; gap: 0.3rem; flex-shrink: 0; }
    .cat-controls button { background: var(--card-bg); color: var(--accent); border: 1px solid var(--border); border-radius: 6px; width: 2rem; height: 2rem; font-size: 0.9rem; cursor: pointer; transition: all 0.18s; display: flex; align-items: center; justify-content: center; }
    .cat-controls button:hover { background: var(--accent); color: #000; border-color: var(--accent); }
    .carousel-track { display: flex; gap: 1rem; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: thin; scrollbar-color: var(--border) transparent; padding-bottom: 0.5rem; }
    .carousel-track::-webkit-scrollbar { height: 4px; }
    .carousel-track::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.15rem 1.2rem; display: flex; flex-direction: column; gap: 0.5rem; min-width: 275px; max-width: 275px; scroll-snap-align: start; flex-shrink: 0; transition: border-color 0.18s, box-shadow 0.18s; }
    .card:hover { border-color: var(--accent-dim); box-shadow: 0 0 24px rgba(200,168,75,0.1); }
    .card-source { font-size: 0.67rem; font-weight: bold; letter-spacing: 0.09em; text-transform: uppercase; color: var(--accent); }
    .card-source a { color: inherit; text-decoration: none; }
    .card-source a:hover { text-decoration: underline; }
    .card-title { font-size: 0.9rem; font-weight: bold; line-height: 1.45; }
    .card-title a { color: var(--text); text-decoration: none; }
    .card-title a:hover { color: var(--accent); }
    .card-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.55; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-date { font-size: 0.66rem; color: #2d4060; margin-top: auto; }
    .no-results { color: var(--muted); font-size: 0.85rem; padding: 0.8rem 0; }

    /* ── GLOSARIO ── */
    .glosario-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 1rem; }
    .glos-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.2rem; display: flex; flex-direction: column; gap: 0.5rem; transition: border-color 0.18s; }
    .glos-card:hover { border-color: var(--accent-dim); }
    .glos-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
    .glos-term { font-size: 0.95rem; font-weight: bold; color: var(--accent); }
    .glos-tag { font-size: 0.6rem; font-weight: bold; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.18rem 0.5rem; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
    .glos-def { font-size: 0.79rem; color: var(--muted); line-height: 1.55; }
    .tag-riesgo    { background: rgba(200,75,75,0.15);   color: #e07070; border: 1px solid rgba(200,75,75,0.3); }
    .tag-adopcion  { background: rgba(74,144,217,0.15);  color: #4a90d9; border: 1px solid rgba(74,144,217,0.3); }
    .tag-regulacion{ background: rgba(139,75,200,0.15);  color: #a06ad9; border: 1px solid rgba(139,75,200,0.3); }
    .tag-tecnologia{ background: rgba(75,200,160,0.15);  color: #4bc8a0; border: 1px solid rgba(75,200,160,0.3); }
    .tag-habilidad { background: rgba(200,168,75,0.15);  color: var(--accent); border: 1px solid var(--accent-dim); }
    .tag-operaciones{ background: rgba(107,127,163,0.15);color: #8a9fc0; border: 1px solid rgba(107,127,163,0.3); }

    /* ── PREGUNTAS ── */
    .preguntas-list { display: flex; flex-direction: column; gap: 0.65rem; max-width: 800px; }
    .pregunta-item { display: flex; align-items: flex-start; gap: 1rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.95rem 1.2rem; transition: border-color 0.18s; }
    .pregunta-item:hover { border-color: var(--accent-dim); }
    .pregunta-num { font-size: 1rem; font-weight: bold; color: var(--accent); min-width: 1.4rem; line-height: 1.55; }
    .pregunta-text { font-size: 0.87rem; color: var(--text); line-height: 1.55; }

    /* ── RETOS ── */
    .retos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1rem; margin-bottom: 0; }
    .reto-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.3rem; display: flex; flex-direction: column; gap: 0.55rem; transition: border-color 0.18s, box-shadow 0.18s; }
    .reto-card:hover { border-color: var(--accent-dim); box-shadow: 0 0 20px rgba(200,168,75,0.08); }
    .reto-icon { font-size: 1.4rem; }
    .reto-title { font-size: 0.95rem; font-weight: bold; color: var(--text); }
    .reto-desc { font-size: 0.79rem; color: var(--muted); line-height: 1.55; }

    /* ── PARADIGMAS ── */
    .paradigmas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .paradigma-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.3rem; display: flex; flex-direction: column; gap: 0.55rem; transition: border-color 0.18s; }
    .paradigma-card:hover { border-color: var(--accent-dim); }
    .paradigma-from { font-size: 0.76rem; color: #3d5270; text-decoration: line-through; }
    .paradigma-to { font-size: 0.98rem; font-weight: bold; color: var(--accent); }
    .paradigma-desc { font-size: 0.79rem; color: var(--muted); line-height: 1.55; }

    /* ── LIDER ALGORITMICO ── */
    .lider-def { background: linear-gradient(135deg, rgba(200,168,75,0.07), rgba(74,144,217,0.04)); border: 1px solid var(--accent-dim); border-radius: var(--radius); padding: 1.8rem 2rem; margin-bottom: 2rem; }
    .lider-def-label { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.6rem; }
    .lider-def-text { font-size: 0.95rem; color: var(--text); line-height: 1.75; max-width: 720px; }

    /* ── COMPETENCIAS ── */
    .competencias-track { display: flex; gap: 1rem; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: thin; scrollbar-color: var(--border) transparent; padding-bottom: 0.5rem; margin-bottom: 2.5rem; }
    .competencias-track::-webkit-scrollbar { height: 4px; }
    .competencias-track::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .comp-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.3rem; display: flex; flex-direction: column; gap: 0.5rem; min-width: 220px; max-width: 220px; scroll-snap-align: start; flex-shrink: 0; transition: border-color 0.18s; }
    .comp-card:hover { border-color: var(--accent-dim); }
    .comp-num { font-size: 1.4rem; font-weight: bold; color: rgba(200,168,75,0.25); line-height: 1; }
    .comp-title { font-size: 0.9rem; font-weight: bold; color: var(--accent); }
    .comp-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.55; }

    /* ── ROLES ── */
    .roles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1rem; margin-bottom: 2.5rem; }
    .role-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; display: flex; flex-direction: column; gap: 0.5rem; transition: border-color 0.18s; }
    .role-card:hover { border-color: var(--accent-dim); }
    .role-header { display: flex; align-items: center; gap: 0.6rem; }
    .role-icon { font-size: 1.1rem; }
    .role-badge { font-size: 0.74rem; font-weight: bold; color: #000; background: var(--accent); padding: 0.18rem 0.6rem; border-radius: 4px; }
    .role-challenge { font-size: 0.76rem; color: var(--muted); font-style: italic; line-height: 1.45; }
    .role-action-label { font-size: 0.63rem; font-weight: bold; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue); margin-top: 0.2rem; }
    .role-action { font-size: 0.82rem; color: var(--text); line-height: 1.55; }

    /* ── KIT ── */
    .kit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1rem; }
    .kit-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; display: flex; flex-direction: column; gap: 0.65rem; transition: border-color 0.18s; }
    .kit-card:hover { border-color: var(--accent-dim); }
    .kit-title { font-size: 0.92rem; font-weight: bold; color: var(--text); }
    .kit-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.5; flex: 1; }
    .kit-tools { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: auto; }
    .kit-tool { font-size: 0.71rem; font-weight: bold; color: var(--accent); background: rgba(200,168,75,0.08); border: 1px solid var(--accent-dim); border-radius: 4px; padding: 0.22rem 0.55rem; text-decoration: none; transition: all 0.18s; }
    .kit-tool:hover { background: var(--accent); color: #000; border-color: var(--accent); }

    /* ── FOOTER ── */
    footer { background: var(--surface); border-top: 1px solid var(--border); text-align: center; padding: 2.5rem 1rem; }
    .footer-logo { font-size: 0.85rem; font-weight: bold; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.5rem; }
    footer p { font-size: 0.76rem; color: var(--muted); }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .hero-question { font-size: 1.85rem; }
      .stats-divider { display: none; }
      .hero-stats { gap: 1.2rem; }
      .card { min-width: 250px; max-width: 250px; }
      .section-wrap { padding: 3.5rem 1rem; }
      .lider-def { padding: 1.3rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">H+B+T Navigator</div>
  <div class="nav-right">
    <div class="nav-links">
      <a href="#signal-board" id="nav-signal">Signal Board</a>
      <a href="#como-prepararme" id="nav-prepare"></a>
      <a href="#liderazgo-ia" id="nav-liderazgo"></a>
    </div>
    <div id="lang-toggle">
      <button id="btn-en" onclick="setLang('en')">EN</button>
      <button id="btn-es" onclick="setLang('es')">ES</button>
    </div>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-eyebrow" id="hero-eyebrow"></div>
  <h1 class="hero-question" id="hero-question"></h1>
  <p class="hero-sub" id="hero-sub"></p>
  <div class="hero-stats" id="hero-stats"></div>
  <div class="hero-pillars">
    <span class="hero-pill" id="pill-1"></span>
    <span class="hero-pill" id="pill-2"></span>
    <span class="hero-pill" id="pill-3"></span>
  </div>
  <div class="hero-cta">
    <a href="#signal-board"     class="btn-primary" id="cta-primary"></a>
    <a href="#como-prepararme"  class="btn-ghost"   id="cta-ghost"></a>
  </div>
  <a href="#signal-board" class="hero-scroll">
    <span id="scroll-label"></span><span>↓</span>
  </a>
</section>

<div class="section-divider"></div>

<!-- SIGNAL BOARD -->
<div id="signal-board">
  <div class="section-wrap">
    <div class="section-inner">
      <div class="section-header">
        <div class="section-eyebrow" id="sb-eyebrow"></div>
        <h2 class="section-title">
          <span id="sb-title"></span>
          <span class="live-badge"><span class="live-dot"></span><span id="live-text"></span></span>
        </h2>
        <p class="section-desc" id="sb-desc"></p>
      </div>
      <div id="search-wrap"><input type="search" id="search" oninput="renderAll()" /></div>
      <div id="signal-categories"></div>
    </div>
  </div>
</div>

<div class="section-divider"></div>

<!-- CÓMO PREPARARME -->
<div id="como-prepararme">
  <div class="section-wrap">
    <div class="section-inner">
      <div class="section-header">
        <div class="section-eyebrow" id="cp-eyebrow"></div>
        <h2 class="section-title" id="cp-title"></h2>
        <p class="section-desc" id="cp-desc"></p>
      </div>
      <div id="pillar-categories"></div>

      <!-- Glosario -->

  { role:"CEO", icon:"🏢", challenge:{es:"Definir la visión y el ritmo de adopción de IA para el grupo",en:"Define the AI adoption vision and pace for the group"}, action:{es:"Usa dashboards de IA para anticipar riesgos sistémicos y ajustar estrategia sin esperar reportes mensuales.",en:"Uses AI dashboards to anticipate systemic risks and adjust strategy without waiting for monthly reports."} },
  { role:"CFO", icon:"💼", challenge:{es:"Integrar IA en ciclos financieros y proyecciones de riesgo",en:"Integrate AI into financial cycles and risk projections"}, action:{es:"Emplea modelos predictivos para stress testing y proyecciones de flujo de caja, acortando el ciclo de cierre.",en:"Uses predictive models for stress testing and cash flow projections, shortening the closing cycle."} },
  { role:"COO", icon:"⚙️", challenge:{es:"Rediseñar procesos operativos incorporando IA",en:"Redesign operational processes incorporating AI"}, action:{es:"Define qué procesa la IA, qué excepciones maneja el equipo humano y cómo se mide la productividad del sistema mixto.",en:"Defines what AI processes, which exceptions the human team handles and how the hybrid system's productivity is measured."} },
  { role:"CHRO", icon:"👥", challenge:{es:"Gestionar el impacto de la IA en el talento y la cultura",en:"Manage the impact of AI on talent and culture"}, action:{es:"Usa IA para predecir rotación, personalizar rutas de aprendizaje y acelerar selección sin perder el juicio humano.",en:"Uses AI to predict turnover, personalize learning paths and accelerate hiring without losing human judgment."} },
  { role:"Chief Risk Officer", icon:"⚖️", challenge:{es:"Supervisar decisiones algorítmicas con trazabilidad regulatoria",en:"Supervise algorithmic decisions with regulatory traceability"}, action:{es:"Establece los umbrales de los modelos de scoring crediticio y garantiza su explicabilidad ante el regulador.",en:"Sets credit scoring model thresholds and ensures their explainability before the regulator."} },
  { role:"Head of Digital / Neobank", icon:"📱", challenge:{es:"Personalizar la experiencia del cliente a escala con IA",en:"Personalize customer experience at scale with AI"}, action:{es:"Define la propuesta de valor donde la IA hiperpersonaliza cada interacción sin perder la confianza del cliente.",en:"Defines the value proposition where AI hyperpersonalizes every interaction without losing customer trust."} },
  { role:"Head of Pagos", icon:"💳", challenge:{es:"Equilibrar velocidad de pago y control de fraude en tiempo real",en:"Balance payment speed and real-time fraud control"}, action:{es:"Establece las reglas de negocio que gobiernan los sistemas de detección de fraude: umbrales, excepciones y escalaciones.",en:"Establishes the business rules governing fraud detection systems: thresholds, exceptions and escalations."} },
  { role:"Head of Crypto", icon:"₿", challenge:{es:"Navegar regulación y volatilidad con soporte de IA",en:"Navigate regulation and volatility with AI support"}, action:{es:"Usa modelos de análisis on-chain y vigilancia regulatoria automatizada para gestionar el riesgo en tiempo real.",en:"Uses on-chain analysis models and automated regulatory surveillance to manage risk in real time."} },
];

/* ── Kit de adopción ── */
const KIT = [
  { useCase:{es:"Trabajo diario aumentado",en:"Augmented daily work"}, desc:{es:"Redacta documentos, resume reuniones, analiza información y prepara presentaciones con asistencia de IA.",en:"Draft documents, summarize meetings, analyze information and prepare presentations with AI assistance."}, tools:[{name:"Claude",url:"https://claude.ai"},{name:"Microsoft Copilot",url:"https://copilot.microsoft.com"},{name:"Google Gemini",url:"https://gemini.google.com"}] },
  { useCase:{es:"Datos y reportes de negocio",en:"Business data & reports"}, desc:{es:"Interpreta tendencias, genera insights accionables y conecta datos de diferentes fuentes en dashboards inteligentes.",en:"Interpret trends, generate actionable insights and connect data from different sources in intelligent dashboards."}, tools:[{name:"Power BI",url:"https://powerbi.microsoft.com"},{name:"Tableau",url:"https://www.tableau.com"},{name:"Looker Studio",url:"https://lookerstudio.google.com"}] },
  { useCase:{es:"Gestión de talento",en:"Talent management"}, desc:{es:"Predice rotación de personal, acelera procesos de selección y personaliza rutas de desarrollo para cada colaborador.",en:"Predict staff turnover, accelerate hiring processes and personalize development paths for each employee."}, tools:[{name:"Eightfold AI",url:"https://eightfold.ai"},{name:"Beamery",url:"https://beamery.com"}] },
  { useCase:{es:"Riesgo crediticio y scoring",en:"Credit risk & scoring"}, desc:{es:"Supervisa modelos de crédito con explicabilidad, controla el bias y asegura trazabilidad regulatoria en cada decisión.",en:"Supervise credit models with explainability, control bias and ensure regulatory traceability in every decision."}, tools:[{name:"Moody's Analytics",url:"https://www.moodysanalytics.com"},{name:"nCino",url:"https://www.ncino.com"},{name:"Zest AI",url:"https://www.zest.ai"}] },
  { useCase:{es:"Cumplimiento y RegTech",en:"Compliance & RegTech"}, desc:{es:"Monitorea riesgos regulatorios, AML y cumplimiento de forma automatizada en los mercados donde opera el grupo.",en:"Monitor regulatory risks, AML and compliance in an automated way across the markets where the group operates."}, tools:[{name:"ComplyAdvantage",url:"https://complyadvantage.com"},{name:"Chainalysis",url:"https://www.chainalysis.com"}] },
  { useCase:{es:"Pagos y detección de fraude",en:"Payments & fraud detection"}, desc:{es:"Define los parámetros de los sistemas que protegen cada transacción en tiempo real, reduciendo falsos positivos.",en:"Define parameters of systems that protect every transaction in real time, reducing false positives."}, tools:[{name:"Featurespace",url:"https://www.featurespace.com"},{name:"Stripe Radar",url:"https://stripe.com/radar"}] },
];

/* ── State ── */
let lang     = detectLang();
let allItems = [];

/* ── Boot ── */
document.addEventListener("DOMContentLoaded", () => {
  buildSections();
  applyLang();
  loadNews();
});

/* ── Language ── */
function detectLang() {
  return (navigator.language || "es").toLowerCase().startsWith("en") ? "en" : "es";
}

function setLang(l) { lang = l; applyLang(); renderAll(); }

function applyLang() {
  const t = I18N[lang];
  document.documentElement.lang = lang;
  document.title = lang === "es"
    ? "Human + Banking + Tech Navigator — IA para líderes financieros"
    : "Human + Banking + Tech Navigator — AI for financial leaders";

  s("#hero-eyebrow").textContent  = t.heroEyebrow;
  s("#hero-question").innerHTML   = t.heroQuestion;
  s("#hero-sub").textContent      = t.heroSub;
  s("#pill-1").textContent = t.pill1; s("#pill-2").textContent = t.pill2; s("#pill-3").textContent = t.pill3;
  s("#cta-primary").textContent = t.ctaPrimary; s("#cta-ghost").textContent = t.ctaGhost;
  s("#scroll-label").textContent = t.scrollLabel;

  s("#hero-stats").innerHTML = t.stats.map((st, i) => `
    ${i > 0 ? '<div class="stats-divider"></div>' : ""}
    <div class="stat">
      <span class="stat-num">${st.num}</span>
      <span class="stat-label">${st.label}</span>
      <a href="${st.url}" target="_blank" rel="noopener" class="stat-source">${st.source} ↗</a>
    </div>
  `).join("");

  s("#sb-eyebrow").textContent = t.sbEyebrow; s("#sb-title").textContent = t.sbTitle;
  s("#live-text").textContent  = t.liveText;  s("#sb-desc").textContent  = t.sbDesc;
  s("#search").placeholder     = t.searchPh;

  s("#cp-eyebrow").textContent = t.cpEyebrow; s("#cp-title").textContent = t.cpTitle; s("#cp-desc").textContent = t.cpDesc;
  s("#glos-eyebrow").textContent = t.glosEyebrow; s("#glos-title").textContent = t.glosTitle; s("#glos-desc").textContent = t.glosDesc;
  s("#preg-eyebrow").textContent = t.pregEyebrow; s("#preg-title").textContent = t.pregTitle; s("#preg-desc").textContent = t.pregDesc;

  s("#lia-eyebrow").textContent  = t.liaEyebrow;  s("#lia-title").textContent  = t.liaTitle;  s("#lia-desc").textContent  = t.liaDesc;
  s("#retos-eyebrow").textContent = t.retosEyebrow; s("#retos-title").textContent = t.retosTitle; s("#retos-desc").textContent = t.retosDesc;
  s("#para-title").textContent   = t.paraTitle;
  s("#lider-eyebrow").textContent = t.liderEyebrow; s("#lider-title").textContent = t.liderTitle;
  s("#lider-def-label").textContent = t.liderDefLabel; s("#lider-def-text").textContent = t.liderDefText;
  s("#comp-title").textContent   = t.compTitle;
  s("#roles-eyebrow").textContent = t.rolesEyebrow; s("#roles-title").textContent = t.rolesTitle;
  s("#kit-eyebrow").textContent  = t.kitEyebrow;   s("#kit-title").textContent  = t.kitTitle; s("#kit-desc").textContent = t.kitDesc;
  s("#footer-text").innerHTML    = t.footer;

  s("#btn-en").classList.toggle("active", lang === "en");
  s("#btn-es").classList.toggle("active", lang === "es");
  s("#nav-signal").textContent   = t.navSignal;
  s("#nav-prepare").textContent  = t.navPrepare;
  s("#nav-liderazgo").textContent= t.navLiderazgo;

  SIGNAL_CATS.concat(PILLAR_CATS).forEach(cat => {
    const titleEl = document.getElementById(`title-${cat.id}`);
    const descEl  = document.getElementById(`desc-${cat.id}`);
    const tagEl   = document.getElementById(`tag-${cat.id}`);
    if (titleEl) titleEl.textContent = cat[lang];
    if (descEl)  descEl.textContent  = lang === "es" ? cat.descEs : cat.descEn;
    if (tagEl)   tagEl.textContent   = t.pillarTag;
  });

  renderStatic();
}

/* ── Build carousel shells ── */
function buildSections() {
  s("#signal-categories").innerHTML = SIGNAL_CATS.map(cat => catHTML(cat, false)).join("");
  s("#pillar-categories").innerHTML = PILLAR_CATS.map(cat => catHTML(cat, true)).join("");
}

function catHTML(cat, isPillar) {
  return `
    <div class="cat-section" id="cat-${cat.id}">
      <div class="cat-header">
        <div class="cat-label">
          <div class="cat-icon">${cat.icon}</div>
          <div class="cat-meta">
            ${isPillar ? `<div class="pillar-tag" id="tag-${cat.id}"></div>` : ""}
            <h3 id="title-${cat.id}"></h3>
            <p id="desc-${cat.id}"></p>
          </div>
        </div>
        <div class="cat-controls">
          <button onclick="scrollCat('${cat.id}',-1)">&#8592;</button>
          <button onclick="scrollCat('${cat.id}',1)">&#8594;</button>
        </div>
      </div>
      <div class="carousel-track" id="track-${cat.id}"></div>
    </div>`;
}

/* ── Load news ── */
async function loadNews() {
  try {
    const res  = await fetch("noticias.json?_=" + Date.now());
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    allItems   = data.items || [];
    renderAll();
  } catch (_) {}
}

/* ── Render news carousels ── */
function renderAll() {
  const term    = (s("#search").value || "").trim().toLowerCase();
  const allCats = SIGNAL_CATS.concat(PILLAR_CATS);
  allCats.forEach(cat => {
    let items = allItems.filter(item => {
      if (item.category !== cat.id) return false;
      if (lang === "en" && item.lang === "es") return false;
      return true;
    });
    if (term) items = items.filter(item =>
      (item.title||"").toLowerCase().includes(term) ||
      (item.description||"").toLowerCase().includes(term) ||
      (item.source||"").toLowerCase().includes(term)
    );
    const track = document.getElementById(`track-${cat.id}`);
    if (!track) return;
    track.innerHTML = items.length
      ? items.map(cardHTML).join("")
      : `<p class="no-results">${I18N[lang].noResults}</p>`;
  });
}

/* ── Render static sections ── */
function renderStatic() {
  renderGlosario();
  renderPreguntas();
  renderRetos();
  renderParadigmas();
  renderCompetencias();
  renderRoles();
  renderKit();
}

function renderGlosario() {
  s("#glosario-grid").innerHTML = GLOSARIO.map(item => `
    <div class="glos-card">
      <div class="glos-header">
        <span class="glos-term">${item.term[lang]}</span>
        <span class="glos-tag ${item.tagClass}">${item.tag[lang]}</span>
      </div>
      <p class="glos-def">${item.def[lang]}</p>
    </div>`).join("");
}

function renderPreguntas() {
  s("#preguntas-list").innerHTML = I18N[lang].preguntas.map((q, i) => `
    <div class="pregunta-item">
      <span class="pregunta-num">${i + 1}</span>
      <span class="pregunta-text">${q}</span>
    </div>`).join("");
}

function renderRetos() {
  s("#retos-grid").innerHTML = RETOS.map(r => `
    <div class="reto-card">
      <div class="reto-icon">${r.icon}</div>
      <div class="reto-title">${r.title[lang]}</div>
      <div class="reto-desc">${r.desc[lang]}</div>
    </div>`).join("");
}

function renderParadigmas() {
  s("#paradigmas-grid").innerHTML = PARADIGMAS.map(p => `
    <div class="paradigma-card">
      <div class="paradigma-from">${p.from[lang]}</div>
      <div class="paradigma-to">→ ${p.to[lang]}</div>
      <div class="paradigma-desc">${p.desc[lang]}</div>
    </div>`).join("");
}

function renderCompetencias() {
  s("#competencias-track").innerHTML = COMPETENCIAS.map(c => `
    <div class="comp-card">
      <div class="comp-num">${c.num}</div>
      <div class="comp-title">${c.title[lang]}</div>
      <div class="comp-desc">${c.desc[lang]}</div>
    </div>`).join("");
}

function renderRoles() {
  const label = I18N[lang].roleActionLabel;
  s("#roles-grid").innerHTML = ROLES.map(r => `
    <div class="role-card">
      <div class="role-header">
        <span class="role-icon">${r.icon}</span>
        <span class="role-badge">${r.role}</span>
      </div>
      <div class="role-challenge">${r.challenge[lang]}</div>
      <div class="role-action-label">${label}</div>
      <div class="role-action">${r.action[lang]}</div>
    </div>`).join("");
}

function renderKit() {
  s("#kit-grid").innerHTML = KIT.map(k => `
    <div class="kit-card">
      <div class="kit-title">${k.useCase[lang]}</div>
      <div class="kit-desc">${k.desc[lang]}</div>
      <div class="kit-tools">
        ${k.tools.map(t => `<a href="${t.url}" target="_blank" rel="noopener" class="kit-tool">${t.name} ↗</a>`).join("")}
      </div>
    </div>`).join("");
}

/* ── Carousel scroll ── */
function scrollCat(catId, dir) {
  const track = document.getElementById(`track-${catId}`);
  if (track) track.scrollBy({ left: dir * 295, behavior: "smooth" });
}

/* ── Card HTML ── */
function cardHTML(item) {
  const title  = esc(item.title || "");
  const desc   = esc(item.description || (lang === "es" ? "Sin resumen disponible." : "No summary available."));
  const source = esc(item.source || "");
  const link   = esc(item.link || "#");
  const srcUrl = esc(item.source_url || item.link || "#");
  const date   = item.pub_date
    ? new Date(item.pub_date).toLocaleDateString(lang === "es" ? "es-ES" : "en-US", { year:"numeric", month:"short", day:"numeric" })
    : "";
  return `
    <article class="card">
      ${source ? `<div class="card-source"><a href="${srcUrl}" target="_blank" rel="noopener">${source}</a></div>` : ""}
      <div class="card-title"><a href="${link}" target="_blank" rel="noopener">${title}</a></div>
      <p class="card-desc">${desc}</p>
      ${date ? `<div class="card-date">${date}</div>` : ""}
    </article>`;
}

function s(sel) { return document.querySelector(sel); }
function esc(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
